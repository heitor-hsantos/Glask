root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/glask ./cmd/glask"
bin = "sh"
args_bin = ["-c", "echo built: ./tmp/glask"]
include_dir = ["cmd", "internal"]
include_ext = ["go"]
exclude_regex = ["_test.go"]
stop_on_error = true
log = "air-build-errors.log"
[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"